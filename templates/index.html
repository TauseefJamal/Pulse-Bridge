<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pulse Bridge | AI Signal Monitor</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    /* --- CSS Variables for Theming --- */
    :root {
      --bg-body: #f8fafc;
      --bg-card: #ffffff;
      --bg-header: rgba(255, 255, 255, 0.8);
      --text-main: #0f172a;
      --text-muted: #64748b;
      --border-color: #e2e8f0;
      --primary: #6366f1;
      --primary-hover: #4f46e5;
      
      /* Status Colors */
      --success-bg: #ecfdf5; --success-text: #059669;
      --danger-bg: #fef2f2; --danger-text: #dc2626;
      --warning-bg: #fffbeb; --warning-text: #d97706;
      --info-bg: #eff6ff; --info-text: #2563eb;
    }

    [data-theme="dark"] {
      --bg-body: #0f172a;
      --bg-card: #1e293b;
      --bg-header: rgba(15, 23, 42, 0.8);
      --text-main: #f1f5f9;
      --text-muted: #94a3b8;
      --border-color: #334155;
      --primary: #818cf8;
      
      --success-bg: #064e3b; --success-text: #6ee7b7;
      --danger-bg: #7f1d1d; --danger-text: #fca5a5;
      --warning-bg: #78350f; --warning-text: #fcd34d;
      --info-bg: #1e3a8a; --info-text: #93c5fd;
    }

    /* --- Global Styles --- */
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-body);
      color: var(--text-main);
      margin: 0;
      transition: background-color 0.3s ease;
      -webkit-font-smoothing: antialiased;
    }

    header {
      background: var(--bg-header);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border-color);
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .brand { display: flex; align-items: center; gap: 12px; }
    
    .live-dot {
      width: 8px; height: 8px;
      background: #22c55e;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); }
      70% { box-shadow: 0 0 0 6px rgba(34, 197, 94, 0); }
      100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
    }

    .controls { display: flex; gap: 12px; align-items: center; }

    .btn {
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid var(--border-color);
      background: var(--bg-card);
      color: var(--text-main);
      transition: all 0.2s;
    }

    .btn-primary { background: var(--primary); color: #fff; border: none; }
    .btn-primary:hover { background: var(--primary-hover); }

    .container { max-width: 1100px; margin: 0 auto; padding: 24px; }

    /* --- Alert Box --- */
    .alert-box {
      background: var(--danger-bg);
      color: var(--danger-text);
      border: 1px solid var(--danger-text);
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 20px;
      display: none;
      justify-content: space-between;
      align-items: center;
      font-size: 14px;
      font-weight: 500;
    }

    /* --- Stats Grid --- */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 20px;
    }

    .stat-label { font-size: 12px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; margin-bottom: 8px; }
    .stat-value { font-size: 28px; font-weight: 700; }

    /* --- Tables & Badges --- */
    .content-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      overflow: hidden;
    }

    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th { text-align: left; padding: 12px 20px; background: rgba(0,0,0,0.02); color: var(--text-muted); font-size: 11px; text-transform: uppercase; }
    td { padding: 14px 20px; border-bottom: 1px solid var(--border-color); }

    .badge { padding: 4px 10px; border-radius: 20px; font-size: 10px; font-weight: 700; text-transform: uppercase; }
    .layoffs { background: var(--danger-bg); color: var(--danger-text); }
    .funding { background: var(--success-bg); color: var(--success-text); }
    .security { background: var(--warning-bg); color: var(--warning-text); }
    .general { background: var(--bg-body); color: var(--text-muted); }
    
    .positive { color: var(--success-text); font-weight: 600; }
    .negative { color: var(--danger-text); font-weight: 600; }
  </style>
</head>

<body>

<header>
  <div class="brand">
    <div class="live-dot"></div>
    <h1>Pulse Bridge</h1>
  </div>
  <div class="controls">
    <button class="btn" onclick="toggleTheme()">Theme</button>
    <button class="btn btn-primary" id="refreshBtn" onclick="refreshAll()">Refresh</button>
  </div>
</header>

<div class="container">
  <div id="alertBox" class="alert-box"></div>

  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-label">Total Headlines</div>
      <div class="stat-value" id="totalNews">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Avg Sentiment</div>
      <div class="stat-value" id="avgSentiment">0.00</div>
    </div>
  </div>

  <div class="content-card">
    <div style="padding: 16px 20px; border-bottom: 1px solid var(--border-color); font-weight: 600;">Latest Signals</div>
    <div style="overflow-x: auto;">
      <table>
        <thead>
          <tr>
            <th>Headline</th>
            <th>Category</th>
            <th>Sentiment</th>
            <th>Time</th>
          </tr>
        </thead>
        <tbody id="newsTable"></tbody>
      </table>
    </div>
  </div>

  <div id="lastUpdated" style="margin-top: 24px; text-align: center; font-size: 12px; color: var(--text-muted);">Initializing...</div>
</div>

<script>
  // --- Theme Logic ---
  function toggleTheme() {
    const current = document.documentElement.getAttribute('data-theme');
    const target = current === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', target);
    localStorage.setItem('pulse_theme', target);
  }

  // --- Data Fetching ---
  async function loadSummary() {
    try {
      const res = await fetch("/api/summary");
      const data = await res.json();
      document.getElementById("totalNews").innerText = data.total_news;
      document.getElementById("avgSentiment").innerText = data.avg_sentiment;
    } catch (e) { console.error("Summary failed", e); }
  }

  async function loadNews() {
    try {
      const res = await fetch("/api/latest");
      const news = await res.json();
      const table = document.getElementById("newsTable");
      table.innerHTML = "";

      news.forEach(item => {
        const row = document.createElement("tr");
        row.innerHTML = `
          <td style="font-weight:500; white-space: normal;">${item.title}</td>
          <td><span class="badge ${item.category}">${item.category}</span></td>
          <td class="${item.sentiment_label}">${item.sentiment_label} (${item.sentiment_score})</td>
          <td style="color: var(--text-muted);">${new Date(item.created_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</td>
        `;
        table.appendChild(row);
      });
    } catch (e) { console.error("News failed", e); }
  }

  async function loadAlerts() {
    try {
      const res = await fetch("/api/alerts");
      const alerts = await res.json();
      const alertBox = document.getElementById("alertBox");

      if (alerts.length > 0) {
        const top = alerts[0];
        alertBox.style.display = "flex";
        alertBox.innerHTML = `
          <span>⚠️ ${top.message}</span>
          <button class="btn" style="padding: 4px 10px; font-size: 11px;" onclick="resolveAlert(${top.id})">Dismiss</button>
        `;
      } else {
        alertBox.style.display = "none";
      }
    } catch (e) { console.error("Alerts failed", e); }
  }

  // --- Actions ---
  async function resolveAlert(id) {
    await fetch(`/api/alerts/resolve/${id}`, { method: 'POST' });
    await loadAlerts();
  }

  async function refreshAll() {
    const btn = document.getElementById("refreshBtn");
    btn.innerText = "Syncing...";
    
    // Trigger background process
    await fetch("/api/refresh", { method: "POST" });
    
    // Wait briefly for the first batch to process
    setTimeout(async () => {
      await Promise.all([loadSummary(), loadNews(), loadAlerts()]);
      document.getElementById("lastUpdated").innerText = "Last Sync: " + new Date().toLocaleTimeString();
      btn.innerText = "Refresh";
    }, 1500);
  }

  // --- Initialization ---
  (function init() {
    const savedTheme = localStorage.getItem('pulse_theme');
    if (savedTheme) {
      document.documentElement.setAttribute('data-theme', savedTheme);
    } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
      document.documentElement.setAttribute('data-theme', 'dark');
    }
    refreshAll();
  })();

  // Poll for UI updates every 60 seconds
  setInterval(() => {
    loadSummary();
    loadNews();
    loadAlerts();
  }, 60000);
</script>

</body>
</html>
